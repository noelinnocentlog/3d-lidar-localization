amcl:
  ros__parameters:
    use_sim_time: true

    # --- TF frames ---
    base_frame_id: "P1_robot0/base_link"
    odom_frame_id: "P1_robot0/odom"
    global_frame_id: "map"

    # --- Sensor topic ---
    scan_topic: "lidar_2d"

    # --- Motion model: differential drive ---
    # Lowered from 0.2 -> 0.1: sim wheel odometry is good, so inject less
    # process noise. The cloud stays tighter and the pose is steadier.
    # If you ever see the estimate lag/drift on fast turns, raise alpha1/alpha4.
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    alpha1: 0.1     # rot noise from rot
    alpha2: 0.1     # rot noise from trans
    alpha3: 0.1     # trans noise from trans
    alpha4: 0.1     # trans noise from rot
    alpha5: 0.1     # omni only (unused here)

    # --- Particle filter sizing ---
    # Denser cloud -> finer pose resolution. Cheap in sim.
    min_particles: 1000
    max_particles: 5000
    pf_err: 0.05
    pf_z: 0.99
    resample_interval: 1

    # --- KLD recovery (mild) ---
    # Kept small so a lost filter can recover, but low enough that random
    # injection does not noticeably degrade a good lock. For ABSOLUTE max
    # steady-state accuracy set both to 0.0 (but then it cannot self-recover
    # if kidnapped -- you'd re-seed with 2D Pose Estimate).
    recovery_alpha_slow: 0.001
    recovery_alpha_fast: 0.1

    # --- Update thresholds: correct far more often ---
    # 0.25 m / 0.2 rad -> 0.10 m / 0.10 rad. Smaller motion between laser
    # corrections = less odom drift accumulates = more accurate tracking.
    update_min_d: 0.10
    update_min_a: 0.10

    # --- Laser likelihood-field model ---
    laser_model_type: "likelihood_field"
    laser_likelihood_max_dist: 2.0
    laser_max_range: 100.0
    laser_min_range: -1.0
    # More beams used in the match -> more constraints -> better accuracy.
    max_beams: 180
    # Trust the (clean) sim laser much more: z_hit up, z_rand down, and a
    # sharper Gaussian (sigma_hit 0.2 -> 0.1) for crisp scan-to-map matching.
    z_hit: 0.8
    z_rand: 0.2
    sigma_hit: 0.1
    z_short: 0.05     # beam-model only (unused by likelihood_field)
    z_max: 0.05       # beam-model only (unused by likelihood_field)
    lambda_short: 0.1 # beam-model only (unused by likelihood_field)

    # --- Beam skipping (off) ---
    do_beamskip: false
    beam_skip_distance: 0.5
    beam_skip_threshold: 0.3
    beam_skip_error_threshold: 0.9

    # --- TF / output ---
    tf_broadcast: true
    # 1.0 -> 0.3: less post-dating of map->odom = lower latency, less "drag"
    # in the pose. Your odom TF runs ~50 Hz so 0.3 s is plenty of headroom.
    # If you get "extrapolation into the future" warnings, bump to 0.5.
    transform_tolerance: 0.3
    save_pose_rate: 0.5

    # --- Initial pose ---
    # STILL 0,0,0 = map origin. Set this to the robot's REAL spawn (map frame)
    # so the cloud starts converged instead of needing a 2D Pose Estimate click.
    set_initial_pose: true
    always_reset_initial_pose: false
    first_map_only: false
    initial_pose:
      x: 0.0
      y: 0.0
      z: 0.0
      yaw: 0.0

map_server:
  ros__parameters:
    use_sim_time: true
    yaml_filename: ""
    topic_name: "map"
    frame_id: "map"

map_saver:
  ros__parameters:
    use_sim_time: true
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: true